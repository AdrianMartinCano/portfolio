<div class="h-dvh flex flex-col bg-fondo p-2 sm:p-4 md:p-6 transition-colors duration-200">

    <!-- Ventana de terminal -->
    <div class="flex-1 flex flex-col min-h-0 rounded-lg border border-borde bg-term shadow-2xl shadow-black/40 overflow-hidden transition-colors duration-200">

        <!-- Barra de título -->
        <div class="flex items-center justify-between gap-2 px-3 sm:px-4 py-2 bg-chrome border-b border-borde select-none">
            <span class="text-apagado text-xs sm:text-sm truncate">adrian&#64;portfolio: ~</span>
            <div class="flex items-center gap-3 sm:gap-4 flex-shrink-0">
                <button (click)="idioma.alternar()"
                        class="text-xs text-apagado cursor-pointer leading-none"
                        [attr.aria-label]="'barra.idioma' | transloco">
                    <span [class.text-verde]="idioma.idioma() === 'es'" [class.font-bold]="idioma.idioma() === 'es'">es</span><span class="mx-0.5">|</span><span [class.text-verde]="idioma.idioma() === 'en'" [class.font-bold]="idioma.idioma() === 'en'">en</span>
                </button>
                <button (click)="tema.alternar()"
                        class="text-apagado hover:text-texto cursor-pointer text-sm leading-none"
                        [attr.aria-label]="(tema.tema() === 'oscuro' ? 'barra.temaClaro' : 'barra.temaOscuro') | transloco">
                    <i [class]="'fas ' + (tema.tema() === 'oscuro' ? 'fa-sun' : 'fa-moon')"></i>
                </button>
                <div class="hidden sm:flex items-center gap-3 text-apagado text-xs leading-none">
                    <span>&#8212;</span>
                    <span>&#9633;</span>
                    <span>&#10005;</span>
                </div>
            </div>
        </div>

        <!-- Pestañas de navegación -->
        <nav class="flex items-stretch bg-chrome border-b border-borde overflow-x-auto select-none">
            @for (pestana of pestanas; track pestana.ruta) {
                <a [routerLink]="pestana.ruta"
                   routerLinkActive="bg-term text-texto"
                   class="px-3 sm:px-4 py-2 text-xs sm:text-sm whitespace-nowrap text-apagado hover:text-texto border-r border-borde transition-colors">
                    {{ 'nav.' + pestana.etiqueta | transloco }}
                </a>
            }
            <button (click)="descargarCV()"
                    class="ml-auto px-3 sm:px-4 py-2 text-xs sm:text-sm whitespace-nowrap text-verde hover:underline cursor-pointer border-l border-borde">
                cv.pdf <i class="fas fa-download text-[0.65rem]"></i>
            </button>
        </nav>

        <!-- Contenido -->
        <main class="flex-1 overflow-auto relative">
            <router-outlet></router-outlet>
        </main>

        <!-- Barra de estado -->
        <app-footer class="flex-shrink-0"></app-footer>
    </div>
</div>
