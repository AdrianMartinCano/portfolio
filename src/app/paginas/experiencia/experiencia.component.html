<div class="p-4 md:p-8 text-sm md:text-base">
    <p class="mb-4">
        <span class="text-verde">adrian&#64;portfolio</span><span class="text-apagado">:</span><span class="text-azul">~</span><span class="text-apagado">$&nbsp;</span><span class="text-texto">cat experiencia.log</span>
    </p>

    @if (cargando() && experiencia().length === 0) {
        <app-spinner-terminal [texto]="'comun.cargando' | transloco" />
    } @else {
    <ul class="list-none space-y-6">
        <li *ngFor="let exp of experiencia()">
            <h3 class="font-semibold text-verde">{{ exp.puesto }}</h3>
            <p class="text-texto">{{ exp.empresa }}</p>
            <p class="text-xs md:text-sm text-apagado">{{ exp.fechaInicio }} / {{ exp.fechaFin }}</p>
            <ul class="mt-2 space-y-1">
                <li *ngFor="let tarea of exp.tareas" class="text-xs md:text-sm text-apagado">
                    <span class="text-verde">-</span> {{ tarea }}
                </li>
            </ul>
        </li>
    </ul>
    }
</div>
