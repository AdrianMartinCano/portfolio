<div class="h-full flex flex-col select-none touch-none"
     (touchstart)="onTouchStart($event)"
     (touchend)="onTouchEnd($event)">

    <p class="text-apagado text-xs mb-1 flex-shrink-0">
        snake &#8212; {{ 'snake.puntuacion' | transloco }}: <span class="text-verde">{{ puntuacion() }}</span>
        <span class="hidden sm:inline"> &middot; {{ 'snake.controles' | transloco }}</span>
        <span class="sm:hidden"> &middot; {{ 'snake.controlesMovil' | transloco }}</span>
        <button (click)="salir.emit()" class="text-rojo hover:underline cursor-pointer ml-3">{{ 'snake.salir' | transloco }}</button>
    </p>

    <div #zona class="flex-1 min-h-0 flex items-center justify-center">
        <div class="relative">
            <pre #tableroPre class="text-verde leading-none text-[10px] sm:text-xs md:text-sm"
                 role="img" [attr.aria-label]="'snake.aria' | transloco">{{ tablero() }}</pre>

            @if (gameOver()) {
                <div class="absolute inset-0 flex flex-col items-center justify-center bg-term/80 gap-1">
                    <p class="text-rojo font-bold">{{ 'snake.gameOver' | transloco }}</p>
                    <p class="text-texto text-sm">{{ 'snake.puntuacion' | transloco }}: {{ puntuacion() }}</p>
                    <p class="text-xs mt-2">
                        <button (click)="reiniciar()" class="text-verde hover:underline cursor-pointer">{{ 'snake.reiniciar' | transloco }}</button>
                        <span class="text-apagado"> &middot; </span>
                        <button (click)="salir.emit()" class="text-rojo hover:underline cursor-pointer">{{ 'snake.salirJuego' | transloco }}</button>
                    </p>
                </div>
            }
        </div>
    </div>
</div>
