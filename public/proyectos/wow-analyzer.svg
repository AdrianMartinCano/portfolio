<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="blade-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff66"/>
      <stop offset="100%" stop-color="#007a30"/>
    </linearGradient>
    <linearGradient id="blade-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff66"/>
      <stop offset="100%" stop-color="#007a30"/>
    </linearGradient>
    <linearGradient id="handle-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c84a"/>
      <stop offset="100%" stop-color="#8a5e0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#07090f"/>

  <!-- Left blade (crescent facing left) -->
  <path d="M14,4 C2,9 2,23 14,28 C9,23 9,9 14,4Z"
        fill="url(#blade-l)" filter="url(#glow)"/>

  <!-- Right blade (crescent facing right) -->
  <path d="M18,4 C30,9 30,23 18,28 C23,23 23,9 18,4Z"
        fill="url(#blade-r)" filter="url(#glow)"/>

  <!-- Handle -->
  <rect x="14.8" y="11" width="2.4" height="10" rx="1.2"
        fill="url(#handle-g)"/>

  <!-- Cross-guard -->
  <ellipse cx="16" cy="16" rx="4.5" ry="1.4" fill="#a07010"/>

  <!-- Fel gem -->
  <circle cx="16" cy="16" r="1.6" fill="#00ff88" opacity=".9" filter="url(#glow)"/>
</svg>